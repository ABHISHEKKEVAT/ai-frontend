<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password | AI Employee Experience</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/dark.css" />
  <style>
    .auth-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      background:
        radial-gradient(circle at 8% 12%, rgba(15, 139, 141, 0.15) 0%, transparent 30%),
        radial-gradient(circle at 92% 18%, rgba(255, 122, 89, 0.16) 0%, transparent 34%),
        linear-gradient(180deg, #f7fcff 0%, #eef6ff 100%);
    }

    .auth-card {
      width: min(460px, 96vw);
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 16px 34px rgba(16, 36, 62, 0.12);
    }

    .auth-card h1 {
      margin-bottom: 8px;
      font-size: clamp(1.5rem, 4vw, 2rem);
    }

    .auth-card p {
      color: var(--muted);
      margin-bottom: 14px;
    }

    .auth-card label {
      display: block;
      margin-bottom: 6px;
      font-weight: 700;
      font-size: 0.9rem;
    }

    .auth-card input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 11px 12px;
      margin-bottom: 12px;
      background: #fff;
    }

    .auth-card input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(15, 139, 141, 0.12);
    }

    .auth-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .status-msg {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #f2f8ff;
      border: 1px solid #d8e7fb;
      color: #2e4a6b;
      display: none;
    }
  </style>
</head>
<body class="auth-page">
  <div class="auth-card">
    <h1>Request Password Reset</h1>
    <p>Enter your account email. Your request will be sent to the server admin for a manual reset.</p>

    <form id="forgotForm">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="you@company.com" required />
      <button type="submit" class="btn-primary" style="width:100%;">Send Reset Request</button>
    </form>

    <div class="status-msg" id="statusMsg"></div>

    <div class="auth-actions">
      <a href="index.html" class="btn-secondary">Back to Home</a>
      <a href="profile.html" class="btn-secondary">Back to Profile</a>
    </div>
  </div>

  <script type="module">
    import { API } from "./js/api.js";

    const form = document.getElementById("forgotForm");
    const emailInput = document.getElementById("email");
    const statusMsg = document.getElementById("statusMsg");

    function showStatus(message) {
      statusMsg.textContent = message;
      statusMsg.style.display = "block";
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = String(emailInput.value || "").trim();
      if (!email) return;

      try {
        const res = await fetch(`${API}/auth/forgot`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          showStatus(data.msg || "Could not submit reset request.");
          return;
        }
        showStatus(data.msg || "Reset request submitted. Admin will reset your password.");
      } catch (error) {
        showStatus("Network error. Please try again.");
      }
    });
  </script>
</body>
</html>
