<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Reset | AI Employee Experience</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/dark.css" />
  <style>
    .auth-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      background:
        radial-gradient(circle at 8% 12%, rgba(15, 139, 141, 0.15) 0%, transparent 30%),
        radial-gradient(circle at 92% 18%, rgba(255, 122, 89, 0.16) 0%, transparent 34%),
        linear-gradient(180deg, #f7fcff 0%, #eef6ff 100%);
    }

    .auth-card {
      width: min(460px, 96vw);
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 16px 34px rgba(16, 36, 62, 0.12);
    }

    .auth-card h1 {
      margin-bottom: 8px;
      font-size: clamp(1.5rem, 4vw, 2rem);
    }

    .auth-card p {
      color: var(--muted);
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .auth-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
  </style>
</head>
<body class="auth-page">
  <div class="auth-card">
    <h1>Password Reset</h1>
    <p>Direct reset links are disabled for this website.</p>
    <p>Use <strong>Request Password Reset</strong> on login and the server admin will reset your account password.</p>

    <div class="auth-actions">
      <a href="forgot.html" class="btn-primary">Request Reset</a>
      <a href="index.html" class="btn-secondary">Back to Home</a>
    </div>
  </div>
</body>
</html>
