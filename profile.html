<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile</title>

  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/header.css" />
  <link rel="stylesheet" href="css/sidebar.css" />
  <link rel="stylesheet" href="css/profile.css" />
  <link rel="stylesheet" href="css/popup.css" />
</head>

<body>
  <div class="main-header">
    <div class="profile-banner">Welcome to your account</div>

    <div class="menu-icon" onclick="toggleSidebar()">☰</div>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
      <h2>Menu</h2>
      <a href="index.html#overview">Overview</a>
      <a href="index.html#benefits">Benefits</a>
      <a href="index.html#use-cases">Use Cases</a>
      <a href="index.html#implementation">Implementation</a>
      <a href="index.html#best-practices">Best Practices</a>
      <a href="index.html#chatbot">Chatbot</a>
      <a href="profile.html">Profile</a>
      <a href="index.html#admin-section">Admin</a>
    </div>

    <header>
      <div class="header-controls">
        <div class="toggle-switch" onclick="toggleDarkMode()">
          <div class="circle"></div>
        </div>

        <div class="profile">
          <button type="button" class="profile-btn" id="profileBtn">
            <span class="profile-icon">👤</span> Profile
          </button>

          <div class="dropdown" id="dropdown">
            <a href="profile.html">My Account</a>
            <a href="#">Settings</a>
            <a href="#" onclick="handleLogout()">Logout</a>
          </div>
        </div>
      </div>
    </header>
  </div>

  <section class="profile-page">
    <div class="profile-container">
      <aside class="profile-sidebar">
        <h3>Account Overview</h3>
        <div id="profileSummary"></div>
        <hr>
        <p><strong>Status:</strong> <span id="verifyStatus">Checking...</span></p>
        <button id="resendVerifyBtn" style="display:none;" onclick="resendVerification()">
          Resend verification
        </button>
      </aside>

      <div class="profile-box">
        <h2>My Profile</h2>
        <div id="profileContent">Loading...</div>

        <form id="profileForm" onsubmit="return updateProfile(event)" class="profile-form">
          <label for="pfName">Name</label>
          <input id="pfName" type="text" placeholder="Your Name">

          <label for="pfAvatar">Profile Picture</label>
          <input id="pfAvatar" type="file" accept="image/*">

          <button type="submit" class="update-btn">Update Profile</button>
          <button type="button" class="logout-btn" onclick="handleLogout()">Logout</button>
        </form>
      </div>
    </div>
  </section>

  <script>
    const API = "https://ai-backend-1-7kxh.onrender.com/api";

    function toggleSidebar() {
      document.getElementById("sidebar").classList.toggle("open");
      document.getElementById("sidebarOverlay").classList.toggle("show");
    }

    function toggleDarkMode() {
      document.body.classList.toggle("dark");
    }

    function handleLogout() {
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      alert("Logged out successfully");
      window.location.href = "index.html";
    }

    async function loadProfile() {
      const token = localStorage.getItem("token");
      const profileContent = document.getElementById("profileContent");
      const profileSummary = document.getElementById("profileSummary");
      const verifyStatus = document.getElementById("verifyStatus");
      const resendVerifyBtn = document.getElementById("resendVerifyBtn");
      const pfName = document.getElementById("pfName");

      if (!token) {
        alert("Please login first");
        window.location.href = "index.html";
        return;
      }

      try {
        const res = await fetch(`${API}/users/me`, {
          headers: { Authorization: `Bearer ${token}` }
        });

        if (!res.ok) {
          throw new Error("Failed to load profile");
        }

        const user = await res.json();

        profileContent.innerHTML = `
          <p><strong>Name:</strong> ${user.name}</p>
          <p><strong>Email:</strong> ${user.email}</p>
          <p><strong>Role:</strong> ${user.role}</p>
          ${user.avatar ? `<img src="https://ai-backend-1-7kxh.onrender.com${user.avatar}" width="120" class="profile-photo">` : ""}
        `;

        profileSummary.innerHTML = `
          <p>${user.name}</p>
          <p>${user.email}</p>
          <p>Role: ${user.role}</p>
        `;

        pfName.value = user.name || "";

        if (user.isVerified) {
          verifyStatus.textContent = "Verified ✅";
          resendVerifyBtn.style.display = "none";
        } else {
          verifyStatus.textContent = "Not verified ❌";
          resendVerifyBtn.style.display = "inline-block";
        }
      } catch (error) {
        console.error(error);
        profileContent.innerHTML = "Failed to load profile.";
      }
    }

    async function updateProfile(e) {
      e.preventDefault();

      const token = localStorage.getItem("token");
      const pfName = document.getElementById("pfName");
      const pfAvatar = document.getElementById("pfAvatar");

      const formData = new FormData();
      formData.append("name", pfName.value);

      if (pfAvatar.files[0]) {
        formData.append("avatar", pfAvatar.files[0]);
      }

      try {
        const res = await fetch(`${API}/users/me`, {
          method: "POST",
          headers: { Authorization: `Bearer ${token}` },
          body: formData
        });

        if (!res.ok) {
          throw new Error("Profile update failed");
        }

        alert("Profile updated");
        loadProfile();
      } catch (error) {
        console.error(error);
        alert("Profile update failed");
      }

      return false;
    }

    async function resendVerification() {
      const user = JSON.parse(localStorage.getItem("user") || "{}");

      if (!user.email) {
        alert("No user email found");
        return;
      }

      try {
        const res = await fetch(`${API}/auth/resend-verify`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: user.email })
        });

        const data = await res.json();
        alert(data.msg || "Verification email sent");
      } catch (error) {
        console.error(error);
        alert("Failed to resend verification email");
      }
    }

    const profileBtn = document.getElementById("profileBtn");
    const dropdown = document.getElementById("dropdown");

    profileBtn.addEventListener("click", function (e) {
      e.stopPropagation();
      dropdown.classList.toggle("show");
    });

    dropdown.addEventListener("click", function (e) {
      e.stopPropagation();
    });

    document.addEventListener("click", function () {
      dropdown.classList.remove("show");
    });

    window.addEventListener("load", loadProfile);
  </script>
</body>
</html>
