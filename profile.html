<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile</title>

  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/header.css" />
  <link rel="stylesheet" href="css/sidebar.css" />
  <link rel="stylesheet" href="css/profile.css" />
  <link rel="stylesheet" href="css/popup.css" />
  <link rel="stylesheet" href="css/dark.css" />
</head>

<body>
  <div class="main-header">
    <div class="profile-banner"></div>

    <div class="menu-icon" onclick="toggleSidebar()">☰</div>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
      <h2>Menu</h2>
      <a href="index.html#overview">Overview</a>
      <a href="index.html#benefits">Benefits</a>
      <a href="index.html#use-cases">Use Cases</a>
      <a href="index.html#implementation">Implementation</a>
      <a href="index.html#best-practices">Best Practices</a>
      <a href="index.html#chatbot">Chatbot</a>
      <a href="profile.html">Profile</a>
      <a href="index.html#admin-section">Admin</a>
    </div>

    <header>
      <div class="header-controls">
        <div class="toggle-switch" onclick="toggleDarkMode()">
          <div class="circle"></div>
        </div>

        <div class="profile">
          <button type="button" class="profile-btn" id="profileBtn">
            <span class="profile-icon">👤</span> Profile
          </button>

          <div class="dropdown" id="dropdown">
            <a href="profile.html">My Account</a>
            <a href="#">Settings</a>
            <a href="#" onclick="handleLogout()">Logout</a>
          </div>
        </div>
      </div>
    </header>
  </div>

  <section class="profile-page">
    <div class="profile-wrapper">

      <!-- LEFT CARD -->
      <div class="overview-card">
        <h2>Account Overview</h2>
        <p id="overviewName">Loading...</p>
        <p id="overviewEmail"></p>
        <p><strong>Role:</strong> <span id="overviewRole"></span></p>
        <hr />
        <p><strong>Status:</strong> <span id="verifyStatus">Checking...</span></p>
      </div>

      <!-- RIGHT CARD -->
      <div class="profile-card">
        <h1>My Profile</h1>

        <div id="profileContent"></div>

        <div class="profile-image-preview">
          <img id="profilePreview" src="https://via.placeholder.com/70" alt="Profile Preview">
        </div>

        <form id="profileForm" onsubmit="return updateProfile(event)">
          <label for="pfName">Name</label>
          <input type="text" id="pfName" />

          <label for="pfAvatar">Profile Picture</label>
          <input type="file" id="pfAvatar" accept="image/*" />

          <button type="submit" class="update-btn">Update Profile</button>
        </form>

        <button class="logout-btn" onclick="handleLogout()">Logout</button>
      </div>

    </div>
  </section>

  <script>
    const API = "https://ai-backend-1-7kxh.onrender.com/api";

    function toggleSidebar() {
      document.getElementById("sidebar").classList.toggle("open");
      document.getElementById("sidebarOverlay").classList.toggle("show");
    }

    function toggleDarkMode() {
      document.body.classList.toggle("dark");

      if (document.body.classList.contains("dark")) {
        localStorage.setItem("theme", "dark");
      } else {
        localStorage.setItem("theme", "light");
      }
    }

    function applySavedTheme() {
      const savedTheme = localStorage.getItem("theme");
      if (savedTheme === "dark") {
        document.body.classList.add("dark");
      }
    }

    function handleLogout() {
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      alert("Logged out successfully");
      window.location.href = "index.html";
    }

    async function loadProfile() {
      const token = localStorage.getItem("token");
      const profileContent = document.getElementById("profileContent");
      const verifyStatus = document.getElementById("verifyStatus");
      const pfName = document.getElementById("pfName");

      const overviewName = document.getElementById("overviewName");
      const overviewEmail = document.getElementById("overviewEmail");
      const overviewRole = document.getElementById("overviewRole");
      const profilePreview = document.getElementById("profilePreview");

      if (!token) {
        alert("Please login first");
        window.location.href = "index.html";
        return;
      }

      try {
        const res = await fetch(`${API}/users/me`, {
          headers: { Authorization: `Bearer ${token}` }
        });

        if (!res.ok) {
          throw new Error("Failed to load profile");
        }

        const user = await res.json();

        profileContent.innerHTML = `
          <p><strong>Name:</strong> ${user.name}</p>
          <p><strong>Email:</strong> ${user.email}</p>
          <p><strong>Role:</strong> ${user.role}</p>
        `;

        overviewName.textContent = user.name || "";
        overviewEmail.textContent = user.email || "";
        overviewRole.textContent = user.role || "";

        pfName.value = user.name || "";

        if (user.avatar) {
          const imageUrl = `https://ai-backend-1-7kxh.onrender.com${user.avatar}`;
          profilePreview.src = imageUrl;
        }

        if (user.isVerified) {
          verifyStatus.textContent = "Verified ✅";
        } else {
          verifyStatus.textContent = "Not verified ❌";
        }
      } catch (error) {
        console.error(error);
        profileContent.innerHTML = "Failed to load profile.";
      }
    }

    async function updateProfile(e) {
      e.preventDefault();

      const token = localStorage.getItem("token");
      const pfName = document.getElementById("pfName");
      const pfAvatar = document.getElementById("pfAvatar");

      const formData = new FormData();
      formData.append("name", pfName.value);

      if (pfAvatar.files[0]) {
        formData.append("avatar", pfAvatar.files[0]);
      }

      try {
        const res = await fetch(`${API}/users/me`, {
          method: "POST",
          headers: { Authorization: `Bearer ${token}` },
          body: formData
        });

        if (!res.ok) {
          throw new Error("Profile update failed");
        }

        alert("Profile updated");
        loadProfile();
      } catch (error) {
        console.error(error);
        alert("Profile update failed");
      }

      return false;
    }

    const pfAvatar = document.getElementById("pfAvatar");
    const profilePreview = document.getElementById("profilePreview");

    pfAvatar.addEventListener("change", function () {
      const file = this.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function (e) {
          profilePreview.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }
    });

    const profileBtn = document.getElementById("profileBtn");
    const dropdown = document.getElementById("dropdown");

    profileBtn.addEventListener("click", function (e) {
      e.stopPropagation();
      dropdown.classList.toggle("show");
    });

    dropdown.addEventListener("click", function (e) {
      e.stopPropagation();
    });

    document.addEventListener("click", function () {
      dropdown.classList.remove("show");
    });

    window.addEventListener("load", () => {
      applySavedTheme();
      loadProfile();
    });
  </script>
</body>
</html>
