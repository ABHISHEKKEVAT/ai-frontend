<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile</title>

  <!-- CSS Files -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/header.css" />
  <link rel="stylesheet" href="css/sidebar.css" />
  <link rel="stylesheet" href="css/profile.css" />
  <link rel="stylesheet" href="css/popup.css" />
</head>

<body>

<!-- HEADER + SIDEBAR -->
<div class="main-header">
  <div class="profile-banner">welcome to your account</div>

  <div class="menu-icon" onclick="toggleSidebar()">☰</div>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <div class="sidebar" id="sidebar">
    <h2>Menu</h2>
    <a href="/ai-frontend/index.html#overview">Overview</a>
    <a href="/ai-frontend/index.html#benefits">Benefits</a>
    <a href="/ai-frontend/index.html#use-cases">Use Cases</a>
    <a href="/ai-frontend/index.html#implementation">Implementation</a>
    <a href="/ai-frontend/index.html#best-practices">Best Practices</a>
    <a href="/ai-frontend/index.html#chatbot">Chatbot</a>
    <a href="/ai-frontend/profile.html">Profile</a>
    <a href="/ai-frontend/index.html#admin-section">Admin</a>
  </div>

  <header>
    <div class="header-controls">
      <div class="toggle-switch" onclick="toggleDarkMode()"><div class="circle"></div></div>

      <div class="profile">
        <button class="profile-btn" onclick="toggleDropdown()">
          <span class="profile-icon">👤</span> Profile
        </button>

        <div class="dropdown" id="dropdown">
          <a href="/ai-frontend/profile.html">My Account</a>
          <a href="#">Settings</a>
          <a href="#" onclick="handleLogout()">Logout</a>
        </div>
      </div>
    </div>
  </header>
</div>

<!-- PROFILE PAGE CONTENT -->
<div class="profile-container">
  <aside class="profile-sidebar">
    <h3>Account Overview</h3>
    <div id="profileSummary"></div>
    <hr>
    <p><strong>Status:</strong> <span id="verifyStatus">Checking...</span></p>
    <button id="resendVerifyBtn" style="display:none;" onclick="resendVerification()">Resend verification</button>
  </aside>

  <div class="profile-box">
    <h2>My Profile</h2>
    <div id="profileContent">Loading...</div>

    <form id="profileForm" onsubmit="return updateProfile(event)">
      <label>Name</label>
      <input id="pfName" type="text">

      <label>Profile Picture</label>
      <input id="pfAvatar" type="file" accept="image/*">

      <button type="submit">Update Profile</button>
    </form>
  </div>
</div>

<!-- JS FILES -->

</body>
</html>
