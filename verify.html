<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Email | AI Employee Experience</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/dark.css" />
  <style>
    .auth-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      background:
        radial-gradient(circle at 8% 12%, rgba(15, 139, 141, 0.15) 0%, transparent 30%),
        radial-gradient(circle at 92% 18%, rgba(255, 122, 89, 0.16) 0%, transparent 34%),
        linear-gradient(180deg, #f7fcff 0%, #eef6ff 100%);
    }

    .auth-card {
      width: min(460px, 96vw);
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 16px 34px rgba(16, 36, 62, 0.12);
    }

    .auth-card h1 {
      margin-bottom: 8px;
      font-size: clamp(1.5rem, 4vw, 2rem);
    }

    .auth-card p {
      color: var(--muted);
      margin-bottom: 14px;
    }

    .auth-card label {
      display: block;
      margin-bottom: 6px;
      font-weight: 700;
      font-size: 0.9rem;
    }

    .auth-card input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 11px 12px;
      margin-bottom: 12px;
      background: #fff;
    }

    .auth-card input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(15, 139, 141, 0.12);
    }

    .auth-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .status-msg {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #f2f8ff;
      border: 1px solid #d8e7fb;
      color: #2e4a6b;
      display: none;
    }
  </style>
</head>
<body class="auth-page">
  <div class="auth-card">
    <h1>Verify Your Email</h1>
    <p>Enter the 6-digit code from your email, or use the verification link in the email.</p>

    <form id="verifyForm">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="you@company.com" required />

      <label for="code">Verification Code</label>
      <input id="code" type="text" inputmode="numeric" maxlength="6" placeholder="123456" required />

      <button type="submit" class="btn-primary" style="width:100%;">Verify Email</button>
    </form>

    <div class="status-msg" id="statusMsg"></div>

    <div class="auth-actions">
      <a href="index.html" class="btn-secondary">Back to Home</a>
      <a href="profile.html" class="btn-secondary">Back to Profile</a>
    </div>
  </div>

  <script type="module">
    import { API } from "./js/api.js";

    const form = document.getElementById("verifyForm");
    const emailInput = document.getElementById("email");
    const codeInput = document.getElementById("code");
    const statusMsg = document.getElementById("statusMsg");
    const searchParams = new URLSearchParams(window.location.search);
    const token = String(searchParams.get("token") || "").trim();
    const prefillEmail = String(searchParams.get("email") || "").trim();

    if (prefillEmail) {
      emailInput.value = prefillEmail.toLowerCase();
    }

    function showStatus(message) {
      statusMsg.textContent = message;
      statusMsg.style.display = "block";
    }

    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/i.test(String(email || "").trim());
    }

    function isValidCode(code) {
      return /^\d{6}$/.test(String(code || "").trim());
    }

    async function verifyByToken() {
      try {
        const res = await fetch(`${API}/auth/verify/${encodeURIComponent(token)}`);
        const text = await res.text();
        showStatus(text || (res.ok ? "Email verified successfully." : "Invalid or expired verification link."));
      } catch {
        showStatus("Network error while verifying. Please try code verification.");
      }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = String(emailInput.value || "").trim().toLowerCase();
      const code = String(codeInput.value || "").trim();

      if (!isValidEmail(email)) {
        showStatus("Please enter a valid email address.");
        return;
      }
      if (!isValidCode(code)) {
        showStatus("Please enter a valid 6-digit verification code.");
        return;
      }

      try {
        const res = await fetch(`${API}/auth/verify-code`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, code })
        });

        const data = await res.json().catch(() => ({}));
        showStatus(data.msg || (res.ok ? "Email verified successfully." : "Verification failed."));
      } catch {
        showStatus("Network error while verifying. Please try again.");
      }
    });

    if (token) {
      verifyByToken();
    }
  </script>
</body>
</html>
